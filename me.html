<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Teams — Sweepstake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#04140d;--panel:#0d2419;--panel2:#0a1e15;--line:#1f4733;--ink:#eafff4;--muted:#7fae97;
    --gold:#ffc83d;--gold2:#ffe39a;--t1:#ffc83d;--t2:#3dd9c9;--t3:#5b8def;--t4:#8a93a6}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sora',system-ui,sans-serif;color:var(--ink);min-height:100vh;
    background:radial-gradient(1000px 520px at 72% -10%,#11543a55,transparent 60%),var(--bg);padding:26px 20px 70px}
  .wrap{max-width:560px;margin:0 auto}
  .pick{display:flex;gap:10px;align-items:center;margin-bottom:18px}
  select{flex:1;background:#08180f;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 12px;font-family:'Sora';font-size:15px}
  button{font-family:'Sora';font-weight:700;border:0;cursor:pointer;border-radius:999px;padding:11px 18px;font-size:14px;
    background:#10301f;color:var(--ink);border:1px solid var(--line)}
  button:hover{background:#143a26}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--gold);
    border-radius:20px;padding:22px;box-shadow:0 16px 50px #ffc83d14}
  .card .top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:14px}
  .card .name{font-family:'Anton';font-size:32px;line-height:1}
  .card .rank{color:var(--muted);font-size:12px;letter-spacing:.1em;margin-top:6px}
  .scores{text-align:right}
  .scores b{font-family:'Anton';font-size:34px;color:var(--gold);display:block;line-height:1}
  .scores small{color:var(--muted);font-size:11px;letter-spacing:.08em}
  .tl{display:flex;flex-direction:column;gap:6px}
  .trow{display:grid;grid-template-columns:11px 1fr auto auto;align-items:center;gap:10px;font-size:14px;padding:7px 0;border-bottom:1px dashed #143726}
  .trow:last-child{border-bottom:0}
  .trow .dot{width:11px;height:11px;border-radius:50%}
  .trow.out{opacity:.42;text-decoration:line-through}
  .trow .tp{color:var(--gold);min-width:34px;text-align:right;font-variant-numeric:tabular-nums}
  .trow .stg{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em}
  .foot{margin-top:14px;color:var(--muted);font-size:11px;text-align:center;letter-spacing:.06em}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--gold);color:#1a1205;
    font-weight:700;padding:10px 18px;border-radius:999px;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}

  .topnav{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .topnav .brand{font-family:'Anton';font-size:20px;color:var(--gold);text-decoration:none;letter-spacing:.02em}
  .topnav .navlinks{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
  .topnav .navlinks a{color:var(--muted);text-decoration:none;font-weight:600;font-size:13px;padding:7px 13px;border-radius:999px}
  .topnav .navlinks a:hover{color:var(--ink)}
  .topnav .navlinks a.on{background:#11301f;color:var(--gold)}
</style>
</head>
<body>
<div class="wrap">
  <nav class="topnav"><a class="brand" href="/tracker">⚽ WC26 Sweepstake</a><div class="navlinks"><a href="/setup">Setup</a><a href="/wheel">Reveal</a><a href="/watch">Watch</a><a href="/tracker">Tracker</a><a href="/me" class="on">My teams</a></div></nav>
  <div id="gate" style="display:none;text-align:center;padding:50px 20px;border:1px dashed var(--line);border-radius:18px;margin-top:10px">
    <div style="font-family:'Anton';font-size:30px;color:var(--gold);text-transform:uppercase">The draw hasn't run yet</div>
    <p style="color:var(--muted);max-width:460px;margin:14px auto 22px">No teams have been handed out. Once the draw is run, this page shows each player their teams.</p>
    <a href="/wheel" style="display:inline-block;font-family:'Sora';font-weight:700;background:linear-gradient(180deg,var(--gold2),var(--gold));color:#1a1205;text-decoration:none;padding:13px 26px;border-radius:999px">Go to the draw →</a>
  </div>
  <div id="live">
    <div class="pick">
      <select id="who"></select>
      <button id="copy">Copy my link</button>
    </div>
    <div class="card" id="card"></div>
    <div class="foot" id="foot"></div>
  </div>
</div>
<div class="toast" id="toast">Link copied</div>

<script>
const SAMPLE={"updated_at":"sample","players":[{"name":"Erol","points":0,"survival":0,"hybrid":0,"alive_teams":9,"total_teams":9,
 "teams":[{"name":"France","tier":1,"group":"I","points":0,"survival":0,"status":"alive","stage":"GROUP_STAGE"}]}],
 "leaderboards":{"hybrid":[{"name":"Erol","score":0}]}};
const TIER={1:cv('--t1'),2:cv('--t2'),3:cv('--t3'),4:cv('--t4')};
const STAGE={GROUP_STAGE:"Group",LAST_32:"R32",LAST_16:"R16",QUARTER_FINALS:"QF",SEMI_FINALS:"SF",THIRD_PLACE:"3rd",FINAL:"Final",WINNER:"Champions"};
function cv(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function esc(s){return String(s==null?'':s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
let DATA=SAMPLE;

function paramPlayer(){return new URLSearchParams(location.search).get('player');}

async function load(){
  let ok=false;
  try{
    const r=await fetch('tracker_data.json?'+Date.now());
    if(r.ok){ DATA=await r.json(); ok = !!(DATA && Array.isArray(DATA.players) && DATA.players.length && DATA.updated_at!=='sample'); }
  }catch(e){ ok=false; }
  const gate=document.getElementById('gate'), live=document.getElementById('live');
  if(!ok){ gate.style.display=''; live.style.display='none'; return; }
  gate.style.display='none'; live.style.display='';
  const sel=document.getElementById('who');
  sel.innerHTML=DATA.players.map(p=>`<option>${esc(p.name)}</option>`).join('');
  const want=paramPlayer();
  if(want && DATA.players.some(p=>p.name===want)) sel.value=want;
  sel.onchange=()=>{setURL(sel.value);render(sel.value);};
  render(sel.value);
}

function rankOf(name){
  const lb=(DATA.leaderboards&&DATA.leaderboards.hybrid)||[];
  const i=lb.findIndex(r=>r.name===name);return i<0?'—':('#'+(i+1)+' of '+lb.length);
}
function render(name){
  const p=DATA.players.find(x=>x.name===name)||DATA.players[0];if(!p)return;
  document.getElementById('card').innerHTML=`
    <div class="top">
      <div><div class="name">${esc(p.name)}</div><div class="rank">${rankOf(p.name)} · ${p.alive_teams}/${p.total_teams} still in</div></div>
      <div class="scores"><b>${p.hybrid}</b><small>${p.points} pts · ${p.survival} surv</small></div>
    </div>
    <div class="tl">${p.teams.map(t=>`
      <div class="trow ${t.status==='out'?'out':''}">
        <span class="dot" style="background:${TIER[t.tier]}"></span>
        <span>${esc(t.name)}</span><span class="stg">${STAGE[t.stage]||t.stage}</span><span class="tp">${t.points+t.survival}</span>
      </div>`).join('')}</div>`;
  document.getElementById('foot').textContent='World Cup 2026 Sweepstake · updated '+(DATA.updated_at||'');
}
function setURL(name){history.replaceState(null,'','?player='+encodeURIComponent(name));}
document.getElementById('copy').onclick=async()=>{
  setURL(document.getElementById('who').value);
  try{await navigator.clipboard.writeText(location.href);}catch(e){}
  const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400);
};
load();
setInterval(load,60000);

window.addEventListener('pageshow',function(e){ if(e.persisted) location.reload(); });
</script>
</body>
</html>
